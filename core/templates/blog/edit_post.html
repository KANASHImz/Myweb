{% extends 'base.html' %}

{% block title %}ویرایش پست - بلاگ من{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="profile-card">
                    <h2 class="mb-4"><i class="bi bi-edit"></i> ویرایش پست</h2>

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">عنوان</label>
                            {{ form.title }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">محتوا</label>
                            {{ form.content }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">دسته‌بندی</label>
                            {{ form.category }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">تگ‌ها</label>
                            {{ form.tags }}
                            <small class="text-muted">تگ‌ها رو با کاما جدا کنید</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">تصویر شاخص</label>
                            {% if post.image %}
                                <div class="mb-2">
                                    <img src="{{ post.image.url }}" alt="" class="rounded" 
                                         style="max-width:200px; max-height:150px;">
                                </div>
                            {% endif %}
                            {{ form.image }}
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary-custom">
                                <i class="bi bi-save"></i> ذخیره تغییرات
                            </button>
                            <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">انصراف</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    form input, form select, form textarea {
        width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px 15px;
    }
    form textarea { min-height: 200px; }
    form input:focus, form select:focus, form textarea:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        outline: none;
    }
</style>
{% endblock %}
